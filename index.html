<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- block zoom in phone-->
    <link rel="stylesheet" href="style.css">
    <title>DI</title>
    <script src="script.js" defer></script>
    <!-- defer makes the browser execute the script after parsing the doc (but before DOMContentLoaded) -->
</head>

<body class="preload">
    <svg width="0" height="0">
        <defs>
            <clipPath id="puzzle-clip" clipPathUnits="objectBoundingBox">
                <path d="M 0.2,0.2 C 0.2,0.1 0.3,0.1 0.4,0.2 C 0.4,0.1 0.6,0.1 0.6,0.2 C 0.7,0.1 0.8,0.1 0.8,0.2 L 0.8,0.4 C 0.9,0.4 0.9,0.6 0.8,0.6 L 0.8,0.8 C 0.8,0.9 0.7,0.9 0.6,0.8 C 0.6,0.9 0.4,0.9 0.4,0.8 C 0.3,0.9 0.2,0.9 0.2,0.8 L 0.2,0.6 C 0.1,0.6 0.1,0.4 0.2,0.4 Z"></path>
            </clipPath>
        </defs>
    </svg>


    <img id="nav-cocas" src="assets/cocas-icon.png" alt="Navigation Cocas"></img>
    <p id="wip-icon">W E B F O L I O</div>
    <div id="paper-cocas">
        <!-- <input> -->
        <!-- <img id="paper-cocas-gif" src=""> -->

        <div class="quadrant" id="q2">
            <div class="flap inner taste">
                <div id="taste" class="flap-link">Taste</div>
            </div>
            <div class="flap outer taste"> <!-- wrapper w/0 clip-path needed for 3d rotation of children-->
                <div class="texture"></div>
            </div>
            <div class="flap inner health">
                <div id="health" class="flap-link">Health</div>
            </div>
            <div class="flap outer health">
                <div class="texture"></div>
            </div>
        </div>

        <div class="quadrant" id="q1">
            <div class="flap inner past">
                <div id="past" class="flap-link">Past</div>
            </div>
            <div class="flap outer past">
                <div class="texture"></div>
            </div>
            <div class="flap inner language">
                <div id="language" class="flap-link">Language</div>
            </div>
            <div class="flap outer language">
                <div class="texture"></div>
            </div>
        </div>

        <div class="quadrant" id="q3">
            <div class="flap inner future">
                <div id="future" class="flap-link">Future</div>
            </div>
            <div class="flap outer future">
                <div class="texture"></div>
            </div>
            <div class="flap inner profile">
                <div id="profile" class="flap-link">Profile</div>
            </div>
            <div class="flap outer profile">
                <div class="texture"></div>
            </div>
        </div>

        <div class="quadrant" id="q4">
            <div class="flap inner now">
                <div id="now" class="flap-link">Now</div>
            </div>
            <div class="flap outer now">
                <div class="texture"></div>
            </div>
            <div class="flap inner contact">
                <div id="contact" class="flap-link">Contact</div>
            </div>
            <div class="flap outer contact">
                <div class="texture"></div>
            </div>
        </div>

    </div>

    
    <section id="page-language" class="content hidden">
        <h1>Language</h1>
        <div class="page-body"></div>
        <!-- <div id="piece-pt" class="puzzle-piece"></div> -->
    </section>
    <section id="page-taste" class="content hidden">
        <h1>Taste</h1>
        <div class="page-body"></div>
    </section>
    <section id="page-health" class="content hidden">
        <h1>Health</h1>
        <div class="page-body"></div>
    </section>
    <section id="page-past" class="content hidden">
        <h1>Past</h1>
        <div class="page-body"></div>
    </section>
    <section id="page-future" class="content hidden">
        <h1>Future</h1>
        <div class="page-body"></div>
    </section>
    <section id="page-profile" class="content hidden">
        <h1>Profile</h1>
        <div class="page-body"></div>
    </section>
    <section id="page-now" class="content hidden">
        <h1>Now</h1>
        <div class="page-body"></div>
    </section>
    <section id="page-contact" class="content hidden">
        <h1>Contact</h1>
        <div class="page-body"></div>
    </section>

</body>

</html>
